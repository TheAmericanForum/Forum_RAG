# Daily ingestion for the New Hampshire Forum (TENANT=nh).
#
# Runs ingest_data.py against NH's Drive folder(s) and upserts into the `nh_chunks`
# Qdrant collection. The first run creates the collection (store.ensure_collection);
# every run after is incremental — a file is skipped when its md5 already matches
# what's stored, so only new/changed transcripts cost embeddings.
#
# Required GitHub secrets:
#   Shared (same for all three states): QDRANT_URL, QDRANT_API_KEY,
#     OPENAI_API_KEY, ANTHROPIC_API_KEY, GOOGLE_SERVICE_ACCOUNT_JSON
#   Per-state: DRIVE_FOLDER_IDS_NH  (comma-separated Drive folder IDs for NH)
name: Ingest NH transcripts

on:
  schedule:
    - cron: "25 8 * * *" # daily 08:25 UTC (staggered from SC/NV)
  workflow_dispatch: {}

concurrency:
  group: ingest-nh
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TENANT: nh
      QDRANT_COLLECTION: nh_chunks
      QDRANT_URL: ${{ secrets.QDRANT_URL }}
      QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      DRIVE_FOLDER_IDS: ${{ secrets.DRIVE_FOLDER_IDS_NH }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Ingest from Drive
        run: python ingest_data.py --source drive --non-interactive
