# Non-secret configuration (safe to commit). Secrets come from env / Heroku config vars.

# Policy/topic areas are per-tenant — each state owns its list in
# branding/<tenant>/policy_areas.yaml (sc, nh, nv). A `policy_areas:` list here
# would act only as a fallback for a tenant that ships no file of its own.

chunk:
  target_tokens: 350        # merge consecutive turns up to ~this many tokens per chunk
  overlap_turns: 1          # overlap between consecutive chunks (in turns)
  max_turns_per_chunk: 40   # hard cap on turns per chunk

models:
  embed: "text-embedding-3-large"        # OpenAI embeddings (3072-dim). Use -small for cheaper/1536-dim.
  classify: "claude-haiku-4-5"           # cheap classifier for policy-area labeling
  retrieval_agent: "claude-sonnet-4-6"   # retrieval planner (tool-calling only, speed matters)
  synthesis_agent: "claude-opus-4-8"     # cited answer synthesis (quality matters)
  synthesis_agent_fallback: "claude-sonnet-5"  # used only if synthesis_agent stays overloaded after retries; set equal to disable

retrieval:
  top_k: 8

qdrant:
  collection: "chunks"
  vector_size: 3072         # MUST match the embedding model's dimension
  local_path: "./.qdrant"   # used only for local dev when QDRANT_URL is unset
