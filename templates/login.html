<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — {{ brand.app_name }}</title>
  <link rel="icon" href="/brand/favicon.svg" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/brand/theme.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&display=swap"
    rel="stylesheet"
  />
  <script>
    (function () {
      var saved = localStorage.getItem("theme");
      var theme = saved || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
</head>
<body>
  <header class="app-header">
    {% include "_brand.html" %}
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <h2>Sign in to continue</h2>
      <p>Access to The Forum is limited to approved accounts.</p>
      <a class="btn-google" href="/auth/login">Sign in with Google</a>
    </div>
  </main>
</body>
</html>
